services:
  # Backend Service
  backend:
    build: ./Backend
    ports:
      - "5000:5000"
    env_file:
      - path: ./Backend/.env
        required: false
    environment:
      - PORT=5000
      - CLIENT_URL=http://localhost:3000
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      - mongo

  # Frontend Service
  frontend:
    build:
      context: ./Frontend
      args:
        VITE_API_URL: /api/v1
    ports:
      - "3000:80"
    depends_on:
      - backend

  # Database Service 
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
